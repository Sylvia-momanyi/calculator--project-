<!DOCTYPE html>
<html>
<head>
    <title>Modern Calculator</title>

    <style>
        body {
            background: #1e1e2f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calculator {
            background: #2c2c3e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation:popIn  0.5s  ease;
        }

          #display {
    background: white;
    color: black;
    width:100%;
    height: 60px;
    font-size:26px;
    margin-bottom:15px;
    text-align:left;
    padding:10px;
    border:none;
    border-radius:10px;
}
#history {
    text-align: right;
    font-size: 14px;
    color: gray;
    margin-bottom: 10px;
    min-height: 20px;
}

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            gap: 10px;
        }

        button {
            height: 60px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #3a3a5a;
            color: white;
            transition:0.2s;
        }

        button:hover {
            background: #57577a;
        }
        button:active {
    transform: scale(0.95);
}

        .equal {
            background: blue;
        }

        .equal:hover {
            background: #e08900;
        }

        .clear {
            background: green;
        }

        .clear:hover {
            background: #d32f2f;
        }
        .delete {
    background: red;
}
.delete:hover {
  background:yellow;
  .HIS {
    background:black;
  }
  .HIS {
    background:navy blue;
  }
  
}
@keyframes popIn {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
    </style>
</head>

<body>
  <div class="calculator">
    <input type="text" id="display" disabled>
  <div class="buttons">

    <!-- Memory row -->
    <button onclick="memoryClear()">MC</button>
    <button onclick="memoryRecall()">MR</button>
    <button onclick="memoryAdd()">M+</button>
    <button onclick="memorySubtract()">M-</button>

    <!-- Scientific -->
    <button onclick="press('sin(')">sin</button>
    <button onclick="press('cos(')">cos</button>
    <button onclick="press('tan(')">tan</button>
    <button onclick="press('log(')">log</button>

    <button onclick="press('sqrt(')">√</button>
    <button onclick="press('ln(')">ln</button>
    <button onclick="press('Math.PI')">π</button>
    <button onclick="press('^')">^</button>

    <!-- Operators -->
    <button onclick="press('/')">÷</button>
    <button onclick="press('*')">×</button>
    <button onclick="press('-')">−</button>
    <button onclick="press('+')">+</button>

    <!-- Numbers -->
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="backspace()" class="delete">⌫</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="calculate()"class="equal">=</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="clearDisplay()"class="clear">C</button>

    <button onclick="press('0')" style="grid-column: span 2;">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="clearHistory()" class="HIS">HIS</button>

</div>
</div>
<div id="history"></div>


<script>
  let memory = 0;
    let display = document.getElementById("display");
    function press(value) {
    display.value += value;

    if (navigator.vibrate) {
        navigator.vibrate(50);
    }
}

    function calculate() {
    try {
        let result = eval(display.value);

        history.innerHTML = display.value + " = " + result;

        display.value = result;

    } catch {
        display.value = "Error";
    }
}

    function clearDisplay() {
    display.value = "";

    if (navigator.vibrate) {
        navigator.vibrate(80);
    }
}
  
function backspace() {
    display.value = display.value.slice(0, -1);

    if (navigator.vibrate) {
        navigator.vibrate(30);
    }
}

function clearHistory() {
    history.innerHTML = "";
    if (navigator.vibrate) navigator.vibrate(80);
}
let history = document.getElementById("history");
function memoryAdd() {
    memory += Number(display.value);
    if (navigator.vibrate) navigator.vibrate(50);
}
function memorySubtract() {
    memory -= Number(display.value);
    memory -= Number(display.value);
    if (navigator.vibrate) navigator.vibrate(50);
}
function memoryRecall() {
    display.value = memory;
    if (navigator.vibrate) navigator.vibrate(50);
}
function memoryClear() {
    memory = 0;
    if (navigator.vibrate) navigator.vibrate(80);
}
function calculate() {
    try {
        let expression = display.value;

        // convert readable math into JavaScript math
        expression = expression
            .replace(/sin/g, "Math.sin")
            .replace(/cos/g, "Math.cos")
            .replace(/tan/g, "Math.tan")
            .replace(/sqrt/g, "Math.sqrt")
            .replace(/log/g, "Math.log10")
            .replace(/ln/g, "Math.log");

        let result = eval(expression);

        history.innerHTML =
            display.value + " = " + result + "<br>" + history.innerHTML;

        display.value = result;

    } catch {
        display.value = "Error";
    }
}

</script>

</body>
</html>
