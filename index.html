<!DOCTYPE html>
<html>
<head>
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
  <div class="calculator">
    <input type="text" id="display" disabled>
  <div class="buttons">

    <!-- Memory row -->
    <button onclick="memoryClear()">MC</button>
    <button onclick="memoryRecall()">MR</button>
    <button onclick="memoryAdd()">M+</button>
    <button onclick="memorySubtract()">M-</button>

    <!-- Scientific -->
    <button onclick="press('sin(')">sin</button>
    <button onclick="press('cos(')">cos</button>
    <button onclick="press('tan(')">tan</button>
    <button onclick="press('log(')">log</button>

    <button onclick="press('sqrt(')">√</button>
    <button onclick="press('ln(')">ln</button>
    <button onclick="press('Math.PI')">π</button>
    <button onclick="press('^')">^</button>

    <!-- Operators -->
    <button onclick="press('/')">÷</button>
    <button onclick="press('*')">×</button>
    <button onclick="press('-')">−</button>
    <button onclick="press('+')">+</button>

    <!-- Numbers -->
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="backspace()" class="delete">⌫</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="calculate()"class="equal">=</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="clearDisplay()"class="clear">C</button>

    <button onclick="press('0')" style="grid-column: span 2;">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="clearHistory()" class="HIS">HIS</button>

</div>
</div>
<div id="history"></div>
<script src="script.js"></script>
</body>
    </html>
